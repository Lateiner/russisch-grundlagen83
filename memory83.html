<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory: Russische Kleidung-Verben</title>
    <!-- Polyfill für Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --accent-orange: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction-box {
            background: #f0f7ff;
            padding: 15px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 25px;
            border-radius: 8px;
        }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .memory-card {
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.5s, visibility 0.5s;
            cursor: pointer;
        }

        /* Verdeckte Karten bleiben im Layout, werden aber unsichtbar */
        .memory-card.matched {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #ddd;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--primary-color);
            color: white;
            font-size: 2.5rem;
        }

        .card-back {
            background-color: #fff;
            transform: rotateY(180deg);
        }

        .card-back.verb {
            color: var(--secondary-color);
        }

        .card-back.image {
            color: #555;
            flex-direction: column;
        }

        .card-back .emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 5px;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--accent-orange); color: white; }

        /* Responsive Design */
        @media (max-width: 768px) {
            .memory-grid { grid-template-columns: repeat(3, 1fr); }
            .memory-card { height: 110px; }
        }

        @media (max-width: 480px) {
            .memory-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 15px; }
            .memory-card { height: 100px; }
            .card-face { font-size: 0.8rem; }
        }

        /* Lösungsfarben */
        .sol-color-0 { background-color: #ffcccb !important; }
        .sol-color-1 { background-color: #ccffcc !important; }
        .sol-color-2 { background-color: #ccccff !important; }
        .sol-color-3 { background-color: #ffffcc !important; }
        .sol-color-4 { background-color: #ffccff !important; }
        .sol-color-5 { background-color: #ccffff !important; }
        .sol-color-6 { background-color: #ffd9b3 !important; }
        .sol-color-7 { background-color: #d9ffb3 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Memory: Kleidung-Verben</h1>

    <div class="instruction-box">
        <strong>Anleitung:</strong> Finde die zusammengehörigen Paare! 
        Klicke eine Karte an, um sie umzudrehen. Eine Karte beschreibt eine Situation (Deutsch), die andere zeigt das passende russische Verb. 
        Gefundene Paare werden ausgeblendet.
    </div>

    <div class="memory-grid" id="game-grid">
        <!-- Karten werden per JS generiert -->
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="initGame()">Zurücksetzen & Mischen</button>
        <button class="btn-sol" onclick="showSolution()">Lösung anzeigen</button>
    </div>
</div>

<script>
    const pairs = [
        { verb: 'НАДЕТЬ ШАПКУ', img: '🧢', desc: 'Mütze aufsetzen' },
        { verb: 'ОДЕТЬ РЕБЁНКА', img: '👶', desc: 'Kind anziehen' },
        { verb: 'ОДЕТЬСЯ', img: '🌅', desc: 'Sich selbst anziehen' },
        { verb: 'ПЕРЕОДЕТЬ РУБАШКУ', img: '👕', desc: 'Hemd wechseln' },
        { verb: 'ПЕРЕОДЕТЬСЯ', img: '🎭', desc: 'Sich selbst umziehen' },
        { verb: 'НАДЕТЬ ОЧКИ', img: '👓', desc: 'Brille aufsetzen' },
        { verb: 'ОДЕТЬ СОБАКУ', img: '🐕', desc: 'Hund anziehen' },
        { verb: 'НАДЕТЬ КОЛЬЦО', img: '💍', desc: 'Ring anstecken' }
    ];

    let flippedCards = [];
    let lockBoard = false;
    let matchCount = 0;
    let isSolutionMode = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        flippedCards = [];
        lockBoard = false;
        matchCount = 0;
        isSolutionMode = false;

        let cardsData = [];
        pairs.forEach((pair, index) => {
            cardsData.push({ id: index, type: 'verb', content: pair.verb });
            cardsData.push({ id: index, type: 'image', emoji: pair.img, desc: pair.desc });
        });

        shuffle(cardsData);

        cardsData.forEach((data, i) => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = data.id;
            card.dataset.index = i;

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            front.textContent = '🇷🇺';

            const back = document.createElement('div');
            back.className = `card-face card-back ${data.type}`;
            
            if (data.type === 'verb') {
                back.textContent = data.content;
            } else {
                back.innerHTML = `<span class="emoji">${data.emoji}</span><span>${data.desc}</span>`;
            }

            card.appendChild(front);
            card.appendChild(back);
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (lockBoard || isSolutionMode) return;
        if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            checkForMatch();
        }
    }

    function checkForMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.id === card2.dataset.id;

        if (isMatch) {
            setTimeout(() => {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchCount++;
                resetTurn();
                if (matchCount === pairs.length) {
                    alert('Gut gemacht! Alle Paare gefunden.');
                }
            }, 600);
        } else {
            lockBoard = true;
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                resetTurn();
            }, 1200);
        }
    }

    function resetTurn() {
        flippedCards = [];
        lockBoard = false;
    }

    function showSolution() {
        isSolutionMode = true;
        const allCards = document.querySelectorAll('.memory-card');
        allCards.forEach(card => {
            card.classList.remove('matched');
            card.classList.add('flipped');
            const colorIndex = card.dataset.id;
            const backFace = card.querySelector('.card-back');
            backFace.className = `card-face card-back sol-color-${colorIndex}`;
            card.onclick = null; // Klicks während Lösung deaktivieren
        });
    }

    document.addEventListener('DOMContentLoaded', initGame);
</script>

</body>
</html>
