<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lückentext: Präpositionen und Endungen</title>
    <!-- Polyfill für Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction-box {
            background: #f0f7ff;
            padding: 20px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 35px;
            border-radius: 8px;
        }

        .instruction-box h2 {
            margin-top: 0;
            color: var(--secondary-color);
            font-size: 1.3rem;
        }

        .exercise-card {
            background: #fff;
            border: 1px solid #e1e4e8;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .exercise-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .task-number {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 0.9em;
            display: block;
            margin-bottom: 5px;
        }

        .sentence {
            font-size: 1.15em;
            margin: 10px 0;
        }

        .verb-hint {
            color: #e67e22;
            font-weight: bold;
        }

        select {
            padding: 8px;
            font-size: 1em;
            border-radius: 6px;
            border: 2px solid #bdc3c7;
            background-color: white;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            margin: 5px 0;
        }

        select.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
            font-weight: bold;
        }

        select.wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
            color: var(--error-color);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-reset:hover { background-color: #7f8c8d; }

        .btn-sol { background-color: #f39c12; color: white; }
        .btn-sol:hover { background-color: #d35400; }

        @media (max-width: 600px) {
            .main-container { padding: 15px; }
            select { width: 100%; }
            .sentence { font-size: 1em; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Präpositionen & Endungen</h1>

    <div class="instruction-box">
        <h2>Anleitung</h2>
        <p>Wählen Sie die richtige Präposition und die passende Endung für das Objekt aus. 
        <br>Merke: <b>на</b> + Akkusativ (auf etwas/wen) oder <b>в</b> + Akkusativ (in etwas hinein).
        <br>Das Feedback erfolgt sofort nach der Auswahl.</p>
    </div>

    <div id="exercise-list">
        <!-- Aufgaben werden hier generiert -->
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetAll()">Zurücksetzen und mischen</button>
        <button class="btn-sol" onclick="showAllSolutions()">Lösungen anzeigen</button>
    </div>
</div>

<script>
    const exercises = [
        { id: 1, sentence: 'Я переоделся ... .', options: ['в тёплый свитер', 'на тёплый свитер', 'в тёплом свитере'], answer: 'в тёплый свитер' },
        { id: 2, sentence: 'Мама надела шапку ... .', options: ['на ребёнка', 'в ребёнка', 'на ребёнке'], answer: 'на ребёнка' },
        { id: 3, sentence: 'Она всегда одевается ... .', options: ['в красивое платье', 'на красивое платье', 'в красивом платье'], answer: 'в красивое платье' },
        { id: 4, sentence: 'Надень перчатки ... !', options: ['на руки', 'в руки', 'на руках'], answer: 'на руки' },
        { id: 5, sentence: 'Мама одела сына ... .', options: ['в новый костюм', 'на новый костюм', 'в новом костюме'], answer: 'в новый костюм' },
        { id: 6, sentence: 'Нужно надеть очки ... .', options: ['на нос', 'в нос', 'на носу'], answer: 'на нос' },
        { id: 7, sentence: 'Мы переоделись ... .', options: ['в спортивную форму', 'на спортивную форму', 'в спортивной форме'], answer: 'в спортивную форму' },
        { id: 8, sentence: 'Папа надел часы ... .', options: ['на руку', 'в руку', 'на руке'], answer: 'на руку' },
        { id: 9, sentence: 'Одень куклу ... !', options: ['в розовое платье', 'на розовое платье', 'в розовом платье'], answer: 'в розовое платье' },
        { id: 10, sentence: 'Я надела кольцо ... .', options: ['на палец', 'в палец', 'на пальце'], answer: 'на палец' },
        { id: 11, sentence: 'Пора переодеть младенца ... .', options: ['в чистую одежду', 'на чистую одежду', 'в чистой одежде'], answer: 'в чистую одежду' },
        { id: 12, sentence: 'Надень свитер ... .', options: ['на собаку', 'в собаку', 'на собаке'], answer: 'на собаku' }, // Fixed typo below
        { id: 12, sentence: 'Надень свитер ... .', options: ['на собаку', 'в собаку', 'на собаке'], answer: 'на собаку' },
        { id: 13, sentence: 'Она оделась ... .', options: ['в тёплое пальто', 'на тёплое пальto', 'в тёплом пальто'], answer: 'в тёплое пальто' },
        { id: 14, sentence: 'Помоги мне надеть чехол ... .', options: ['на телефон', 'в телефон', 'на телефоне'], answer: 'на телефон' },
        { id: 15, sentence: 'Антон переоделся ... .', options: ['в строгий костюм', 'на строгий костюм', 'в строгом костюме'], answer: 'в строгий костюм' },
        { id: 16, sentence: 'Надень маску ... !', options: ['на лицо', 'в лицо', 'на лице'], answer: 'на лицо' },
        { id: 17, sentence: 'Бабушка одела внука ... .', options: ['в зимнюю куртку', 'на зимнюю куртку', 'в зимней куртке'], answer: 'в зимнюю куртку' },
        { id: 18, sentence: 'Я хочу переодеться ... .', options: ['в домашнюю одежду', 'на домашнюю одежду', 'в домашней одежде'], answer: 'в домашнюю одежду' },
        { id: 19, sentence: 'Сестра надела платок ... .', options: ['на голову', 'в голову', 'на голове'], answer: 'на голову' },
        { id: 20, sentence: 'Он переоделся ... .', options: ['в пижаму', 'на пижаму', 'в пижаме'], answer: 'в пижаму' }
    ];

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';
        exercises.forEach((ex, index) => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            
            const shuffledOptions = shuffle(ex.options);
            const optionsHtml = shuffledOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('');
            
            const sentenceHtml = ex.sentence.replace('...', 
                `<select id="sel-${ex.id}" onchange="checkAnswer(this, '${ex.answer}')">
                    <option value="">-- ? --</option>
                    ${optionsHtml}
                </select>`
            );

            card.innerHTML = `
                <span class="task-number">Aufgabe ${index + 1}</span>
                <div class="sentence">${sentenceHtml}</div>
            `;
            list.appendChild(card);
        });
    }

    window.checkAnswer = function(selectElement, correctAnswer) {
        if (selectElement.value === "") {
            selectElement.className = "";
            return;
        }
        if (selectElement.value === correctAnswer) {
            selectElement.className = "correct";
        } else {
            selectElement.className = "wrong";
        }
    };

    window.resetAll = function() {
        initExercises();
    };

    window.showAllSolutions = function() {
        exercises.forEach(ex => {
            const sel = document.getElementById(`sel-${ex.id}`);
            sel.value = ex.answer;
            sel.className = "correct";
        });
    };

    document.addEventListener('DOMContentLoaded', initExercises);
</script>

</body>
</html>
