<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fehlersuche: Russische Kleidung-Verben (10 Aufgaben)</title>
    <!-- Polyfill für Drag and Drop auf Touch-Geräten -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --accent-orange: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 10px;
        }

        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction-box {
            background: #eef7fd;
            padding: 20px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .instruction-box h2 {
            margin-top: 0;
            font-size: 1.3rem;
            color: var(--secondary-color);
        }

        .exercise-card {
            background: #fff;
            border: 1px solid #e1e4e8;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            transition: box-shadow 0.3s ease;
        }

        .exercise-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .task-title {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
            display: block;
        }

        .sentence-option {
            display: block;
            padding: 10px 15px;
            margin: 8px 0;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sentence-option:hover {
            border-color: var(--secondary-color);
            background: #e3f2fd;
        }

        .sentence-option.selected-wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
            color: var(--error-color);
        }

        .sentence-option.selected-correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
            font-weight: bold;
        }

        .correction-area {
            margin-top: 15px;
            padding: 15px;
            background: #fff9f0;
            border-radius: 8px;
            display: none; 
        }

        .correction-area.visible {
            display: block;
        }

        select {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 2px solid #bdc3c7;
            margin-top: 5px;
            background: white;
        }

        select.correct {
            border-color: var(--success-color);
            color: var(--success-color);
            font-weight: bold;
        }

        select.wrong {
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--accent-orange); color: white; }

        @media (max-width: 600px) {
            .main-wrapper { padding: 15px; }
            .btn-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>Russisch-Training: Fehlersuche</h1>

    <div class="instruction-box">
        <h2>Kurzanleitung</h2>
        <p>In jeder Aufgabe findest du drei Sätze. Zwei sind korrekt, einer enthält einen Fehler. 
        <br>1. Klicke auf den <b>falschen Satz</b>. 
        <br>2. Wähle im erscheinenden Menü die <b>korrekte Form</b> aus.</p>
    </div>

    <div id="exercise-container">
        <!-- Aufgaben werden per JS geladen -->
    </div>
</div>

<script>
    const taskData = [
        {
            id: 1,
            sentences: [
                { text: "Надень шапку, на улице холодно!", isWrong: false },
                { text: "Одень ребёнка в тёплый свитер.", isWrong: false },
                { text: "Мама, одень мне это платье!", isWrong: true } // Korrekt: надень
            ],
            options: ["надень", "одень", "переодень"],
            correct: "надень"
        },
        {
            id: 2,
            sentences: [
                { text: "Я надеваю очки, чтобы читать.", isWrong: false },
                { text: "Он надевает сына перед прогулкой.", isWrong: true }, // Korrekt: одевает
                { text: "Мы всегда одеваемся тепло зимой.", isWrong: false }
            ],
            options: ["надевает", "одевает", "переодевает"],
            correct: "одевает"
        },
        {
            id: 3,
            sentences: [
                { text: "Нужно переодеть грязную рубашку.", isWrong: false },
                { text: "Помоги мне одеть это кольцо.", isWrong: true }, // Korrekt: надеть
                { text: "Она одела куклу в красивый наряд.", isWrong: false }
            ],
            options: ["надеть", "одеть", "переодеть"],
            correct: "надеть"
        },
        {
            id: 4,
            sentences: [
                { text: "Я хочу переодеться в платье.", isWrong: false },
                { text: "Надень свитер на собаку.", isWrong: false },
                { text: "Оденься эту куртку!", isWrong: true } // Korrekt: надень
            ],
            options: ["Надень", "Одень", "Оденься"],
            correct: "Надень"
        },
        {
            id: 5,
            sentences: [
                { text: "Они одели детей в школу.", isWrong: false },
                { text: "Сестра наделась очень стильно.", isWrong: true }, // Korrekt: оделась
                { text: "Я надела новые туфли.", isWrong: false }
            ],
            options: ["оделась", "наделась", "одела"],
            correct: "оделась"
        },
        {
            id: 6,
            sentences: [
                { text: "Папа наденет новый костюм.", isWrong: false },
                { text: "Пожалуйста, одень перчатки.", isWrong: true }, // Korrekt: надень
                { text: "Мы переоделись после работы.", isWrong: false }
            ],
            options: ["надень", "одень", "оденься"],
            correct: "надень"
        },
        {
            id: 7,
            sentences: [
                { text: "Ты уже оделся?", isWrong: false },
                { text: "Она одела собаку в комбинезон.", isWrong: false },
                { text: "Я надену дочку в розовое платье.", isWrong: true } // Korrekt: одену
            ],
            options: ["одену", "надену", "наденусь"],
            correct: "одену"
        },
        {
            id: 8,
            sentences: [
                { text: "Бабушка надевает платок.", isWrong: false },
                { text: "Дети быстро надеваются.", isWrong: true }, // Korrekt: одеваются
                { text: "Пора переодеть младенца.", isWrong: false }
            ],
            options: ["одеваются", "надеваются", "надевают"],
            correct: "одеваются"
        },
        {
            id: 9,
            sentences: [
                { text: "Он одел брата.", isWrong: false },
                { text: "Я переодела грязное платье.", isWrong: false },
                { text: "Мы одели на себя маски.", isWrong: true } // Korrekt: надели
            ],
            options: ["надели", "одели", "оделись"],
            correct: "надели"
        },
        {
            id: 10,
            sentences: [
                { text: "Вы переодеваетесь после тренировки.", isWrong: false },
                { text: "Она надела на ребёнка шапку.", isWrong: false },
                { text: "Нужно переодеться это пальто.", isWrong: true } // Korrekt: переодеть
            ],
            options: ["переодеть", "переодеться", "надеть"],
            correct: "переодеть"
        }
    ];

    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function renderTasks() {
        const container = document.getElementById('exercise-container');
        container.innerHTML = '';

        taskData.forEach((task) => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.id = `card-${task.id}`;

            const shuffledSentences = shuffleArray(task.sentences);

            let sentencesHtml = shuffledSentences.map((s, idx) => `
                <div class="sentence-option" 
                     onclick="handleSentenceClick(${task.id}, ${s.isWrong}, this)"
                     id="task-${task.id}-opt-${idx}">
                    ${s.text}
                </div>
            `).join('');

            card.innerHTML = `
                <span class="task-title">Aufgabe ${task.id}: Finde den Fehler</span>
                <div id="sentence-list-${task.id}">
                    ${sentencesHtml}
                </div>
                <div class="correction-area" id="correction-${task.id}">
                    <strong>Richtig! Das war der Fehler.</strong><br>
                    Wähle die korrekte Form:
                    <select id="select-${task.id}" onchange="checkCorrection(${task.id}, '${task.correct}')">
                        <option value="">-- Korrektur wählen --</option>
                        ${shuffleArray(task.options).map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn-reset" onclick="resetTask(${task.id})">Zurücksetzen & Mischen</button>
                    <button class="btn-sol" onclick="showSolution(${task.id})">Lösung anzeigen</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.handleSentenceClick = function(taskId, isWrong, element) {
        const card = document.getElementById(`card-${taskId}`);
        const options = card.querySelectorAll('.sentence-option');
        const correctionArea = document.getElementById(`correction-${taskId}`);

        // Reset previous selections in this specific card
        options.forEach(opt => opt.className = 'sentence-option');

        if (isWrong) {
            element.classList.add('selected-correct');
            correctionArea.classList.add('visible');
        } else {
            element.classList.add('selected-wrong');
            correctionArea.classList.remove('visible');
        }
    };

    window.checkCorrection = function(taskId, correctValue) {
        const select = document.getElementById(`select-${taskId}`);
        if (select.value === correctValue) {
            select.className = 'correct';
        } else {
            select.className = 'wrong';
        }
    };

    window.resetTask = function(taskId) {
        // Find specific task or just re-render all for simplicity with shuffle
        renderTasks(); 
    };

    window.showSolution = function(taskId) {
        const task = taskData.find(t => t.id === taskId);
        const card = document.getElementById(`card-${taskId}`);
        const options = card.querySelectorAll('.sentence-option');
        const correctionArea = document.getElementById(`correction-${taskId}`);
        const select = document.getElementById(`select-${taskId}`);

        options.forEach(opt => {
            const originalData = task.sentences.find(s => s.text === opt.innerText.trim());
            if (originalData.isWrong) {
                opt.className = 'sentence-option selected-correct';
            } else {
                opt.className = 'sentence-option';
            }
        });

        correctionArea.classList.add('visible');
        select.value = task.correct;
        select.className = 'correct';
    };

    document.addEventListener('DOMContentLoaded', renderTasks);
</script>

</body>
</html>
