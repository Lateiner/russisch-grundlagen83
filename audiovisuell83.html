<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Visual-Check: Russische Kleidung-Verben</title>
    <!-- Polyfill für Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --accent-orange: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction-box {
            background: #eef7fd;
            padding: 20px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* Audio Bereich */
        .audio-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
        }

        .play-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .play-btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        /* Bild-Optionen */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .image-card {
            background: #fff;
            border: 4px solid #eee;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-5px);
        }

        .image-card .visual {
            font-size: 80px;
            margin-bottom: 15px;
            display: block;
        }

        .image-card .label {
            font-weight: bold;
            color: #7f8c8d;
        }

        .image-card.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
        }

        .image-card.wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
        }

        /* Steuerung */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--accent-orange); color: white; }
        .btn-next { background-color: var(--success-color); color: white; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            .image-card .visual { font-size: 60px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Audio-Visual-Check</h1>

    <div class="instruction-box">
        <strong>Anleitung:</strong> Klicke auf den blauen Lautsprecher, um die Aufforderung eines russischen Sprechers zu hören. Wähle danach das Bild aus, das die Aktion korrekt darstellt. Achte besonders auf die Präfixe!
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="game-area">
        <div class="audio-section">
            <button class="play-btn" onclick="speakCurrentPhrase()">
                🔊
            </button>
            <p id="audio-status">Klicke, um zu hören</p>
        </div>

        <div class="options-grid" id="optionsGrid">
            <!-- Karten werden per JS geladen -->
        </div>
    </div>

    <div class="controls">
        <button class="btn-action btn-reset" onclick="resetGame()">Neu mischen</button>
        <button class="btn-action btn-sol" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn-action btn-next" id="nextBtn" onclick="nextTask()" style="display:none;">Nächste Aufgabe</button>
    </div>
</div>

<script>
    const tasks = [
        {
            phrase: "Надень шапку!",
            options: [
                { visual: "🧢👤", label: "Mütze aufsetzen", isCorrect: true },
                { visual: "👩‍👦🧢", label: "Kind anziehen", isCorrect: false }
            ]
        },
        {
            phrase: "Одень ребёнка!",
            options: [
                { visual: "👩‍👦👕", label: "Kind anziehen", isCorrect: true },
                { visual: "👤👕", label: "Sich selbst anziehen", isCorrect: false }
            ]
        },
        {
            phrase: "Надень очки!",
            options: [
                { visual: "👓👤", label: "Brille aufsetzen", isCorrect: true },
                { visual: "💍☝️", label: "Ring anstecken", isCorrect: false }
            ]
        },
        {
            phrase: "Одень собаку!",
            options: [
                { visual: "🐕🧥", label: "Hund anziehen", isCorrect: true },
                { visual: "👤🧥", label: "Jacke anziehen", isCorrect: false }
            ]
        },
        {
            phrase: "Переоденься!",
            options: [
                { visual: "🔄👕", label: "Sich umziehen", isCorrect: true },
                { visual: "🛌💤", label: "Schlafen gehen", isCorrect: false }
            ]
        },
        {
            phrase: "Надень кольцо!",
            options: [
                { visual: "💍☝️", label: "Ring anstecken", isCorrect: true },
                { visual: "🧣👤", label: "Schal umlegen", isCorrect: false }
            ]
        },
        {
            phrase: "Одень куклу!",
            options: [
                { visual: "🪆👗", label: "Puppe anziehen", isCorrect: true },
                { visual: "👗👤", label: "Kleid anziehen", isCorrect: false }
            ]
        },
        {
            phrase: "Переодень ребёнка!",
            options: [
                { visual: "👩‍👦🔄", label: "Kind umziehen", isCorrect: true },
                { visual: "👩‍👦🚶", label: "Mit Kind spazieren", isCorrect: false }
            ]
        }
    ];

    let currentTaskIdx = 0;
    let synth = window.speechSynthesis;
    let russianMaleVoice = null;
    let canInteract = true;

    // Stimmen laden
    function loadVoices() {
        let voices = synth.getVoices();
        // Suche russische Stimme, idealerweise männlich (Maxim, Pavel etc.)
        russianMaleVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Maxim') || v.name.includes('Pavel') || v.name.includes('Male'))) 
                           || voices.find(v => v.lang.includes('ru'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speakCurrentPhrase() {
        if (!synth) return;
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(tasks[currentTaskIdx].phrase);
        utterance.voice = russianMaleVoice;
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9; // Etwas langsamer für Lernende
        synth.speak(utterance);
        document.getElementById('audio-status').innerText = "Spiele ab...";
        utterance.onend = () => {
            document.getElementById('audio-status').innerText = "Noch einmal hören?";
        };
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function renderTask() {
        const task = tasks[currentTaskIdx];
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        document.getElementById('nextBtn').style.display = 'none';
        canInteract = true;
        document.getElementById('audio-status').innerText = "Klicke, um zu hören";

        // Fortschritt
        const progress = ((currentTaskIdx) / tasks.length) * 100;
        document.getElementById('progressFill').style.width = `${progress}%`;

        // Optionen mischen
        const shuffledOptions = shuffle([...task.options]);

        shuffledOptions.forEach((opt, idx) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <span class="visual">${opt.visual}</span>
                <span class="label">${opt.label}</span>
            `;
            card.onclick = () => selectOption(card, opt.isCorrect);
            grid.appendChild(card);
        });
    }

    function selectOption(card, isCorrect) {
        if (!canInteract) return;

        const cards = document.querySelectorAll('.image-card');
        if (isCorrect) {
            card.classList.add('correct');
            canInteract = false;
            document.getElementById('nextBtn').style.display = 'block';
            if (currentTaskIdx === tasks.length - 1) {
                document.getElementById('nextBtn').innerText = "Abschließen";
            }
        } else {
            card.classList.add('wrong');
            setTimeout(() => card.classList.remove('wrong'), 800);
        }
    }

    function nextTask() {
        if (currentTaskIdx < tasks.length - 1) {
            currentTaskIdx++;
            renderTask();
        } else {
            alert("Klasse! Du hast alle Audio-Aufgaben gemeistert.");
            resetGame();
        }
    }

    function resetGame() {
        currentTaskIdx = 0;
        shuffle(tasks);
        renderTask();
    }

    function showSolution() {
        const cards = document.querySelectorAll('.image-card');
        const task = tasks[currentTaskIdx];
        
        cards.forEach(card => {
            const label = card.querySelector('.label').innerText;
            const originalOpt = task.options.find(o => o.label === label);
            if (originalOpt.isCorrect) {
                card.classList.add('correct');
            }
        });
        canInteract = false;
        document.getElementById('nextBtn').style.display = 'block';
    }

    // Initialisierung
    window.onload = () => {
        loadVoices();
        shuffle(tasks);
        renderTask();
    };
</script>

</body>
</html>
