<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot-Training: Russische Kleidung-Verben (9 Aufgaben)</title>
    <!-- Polyfill für Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent-orange: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 10px;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction-box {
            background: #eef7fd;
            padding: 15px;
            border-left: 6px solid var(--secondary-color);
            margin-bottom: 25px;
            border-radius: 8px;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        /* Bild-Bereich */
        .image-container {
            position: relative;
            flex: 1 1 350px;
            max-width: 450px;
            background: #fff;
            border-radius: 12px;
            padding: 10px;
            border: 2px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .person-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Hotspots */
        .hotspot {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--secondary-color);
            color: white;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .hotspot:hover {
            transform: translate(-50%, -50%) scale(1.2);
            background: var(--accent-orange);
        }

        .hotspot.active {
            background: var(--accent-orange);
            box-shadow: 0 0 0 6px rgba(230, 126, 34, 0.3);
        }

        .hotspot.completed {
            background: var(--success-color);
        }

        /* Aufgaben-Panel */
        .task-panel {
            flex: 1 1 320px;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #eee;
            min-height: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .task-placeholder {
            color: #95a5a6;
            text-align: center;
            margin-top: 100px;
            font-style: italic;
        }

        .task-content h3 {
            margin-top: 0;
            color: var(--secondary-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .sentence-display {
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }

        select {
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 2px solid #bdc3c7;
            width: 100%;
            cursor: pointer;
            outline: none;
            background-color: white;
            transition: all 0.2s;
        }

        select.correct {
            border-color: var(--success-color);
            background-color: #eafaf1;
            color: var(--success-color);
            font-weight: bold;
        }

        select.wrong {
            border-color: var(--error-color);
            background-color: #fdedec;
            color: var(--error-color);
        }

        /* Kontrollen */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--accent-orange); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        @media (max-width: 650px) {
            .workspace { flex-direction: column; align-items: center; }
            .image-container { max-width: 100%; }
            .task-panel { width: 100%; min-height: auto; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Hotspot-Training: Kleidung & Verben</h1>

    <div class="instruction-box">
        <strong>Anleitung:</strong> Klicke auf die 9 Hotspots im Bild. Der entsprechende russische Satz erscheint rechts. Wähle das richtige Verb aus. Die Reihenfolge der Verben wird bei jedem Klick neu gemischt!
    </div>

    <div class="workspace">
        <div class="image-container">
            <!-- SVG-Grafik der Person -->
            <svg class="person-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="285" width="200" height="15" fill="#dfe6e9"/> <!-- Boden -->
                <circle cx="100" cy="50" r="20" fill="#ffe0bd"/> <!-- Kopf -->
                <rect x="80" y="70" width="40" height="85" rx="5" fill="#2c3e50"/> <!-- Jacke -->
                <rect x="65" y="75" width="15" height="60" rx="5" fill="#2c3e50"/> <!-- Arm L -->
                <rect x="120" y="75" width="15" height="60" rx="5" fill="#2c3e50"/> <!-- Arm R -->
                <rect x="82" y="155" width="16" height="100" fill="#34495e"/> <!-- Bein L -->
                <rect x="102" y="155" width="16" height="100" fill="#34495e"/> <!-- Bein R -->
                
                <!-- Accessoires -->
                <rect x="85" y="32" width="30" height="15" rx="5" fill="#e74c3c"/> <!-- Mütze -->
                <rect x="80" y="65" width="40" height="10" rx="3" fill="#f1c40f"/> <!-- Schal -->
                <rect x="65" y="130" width="15" height="15" rx="3" fill="#e67e22"/> <!-- Handschuh L -->
                <rect x="120" y="130" width="15" height="15" rx="3" fill="#e67e22"/> <!-- Handschuh R -->
                <rect x="76" y="255" width="22" height="12" rx="4" fill="#8e44ad"/> <!-- Schuh L -->
                <rect x="102" y="255" width="22" height="12" rx="4" fill="#8e44ad"/> <!-- Schuh R -->
                <rect x="120" y="105" width="16" height="6" fill="#bdc3c7"/> <!-- Uhr am Handgelenk -->
            </svg>

            <!-- Hotspots -->
            <div class="hotspot" style="top: 13%; left: 50%;" onclick="loadTask(0)" id="hs-0">1</div>
            <div class="hotspot" style="top: 24%; left: 50%;" onclick="loadTask(1)" id="hs-1">2</div>
            <div class="hotspot" style="top: 36%; left: 50%;" onclick="loadTask(2)" id="hs-2">3</div>
            <div class="hotspot" style="top: 48%; left: 34%;" onclick="loadTask(3)" id="hs-3">4</div>
            <div class="hotspot" style="top: 88%; left: 50%;" onclick="loadTask(4)" id="hs-4">5</div>
            <div class="hotspot" style="top: 65%; left: 66%;" onclick="loadTask(5)" id="hs-5">6</div>
            <div class="hotspot" style="top: 39%; left: 66%;" onclick="loadTask(6)" id="hs-6">7</div>
            <div class="hotspot" style="top: 45%; left: 45%;" onclick="loadTask(7)" id="hs-7">8</div>
            <div class="hotspot" style="top: 65%; left: 45%;" onclick="loadTask(8)" id="hs-8">9</div>
        </div>

        <!-- Aufgaben-Bereich -->
        <div class="task-panel" id="task-panel">
            <div id="placeholder" class="task-placeholder">
                Wähle einen Hotspot im Bild aus...
            </div>
            <div id="task-content" style="display:none;">
                <h3 id="task-title">Thema</h3>
                <div class="sentence-display" id="sentence-display">
                    ...
                </div>
                <select id="verb-select" onchange="checkAnswer()">
                    <!-- Optionen werden gemischt eingefügt -->
                </select>
                <div id="feedback" style="margin-top: 15px; font-weight: bold; font-size: 1.1rem;"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetEverything()">Zurücksetzen & mischen</button>
        <button class="btn-sol" onclick="solveAll()">Lösung anzeigen</button>
    </div>
</div>

<script>
    const taskData = [
        {
            title: "Mütze (шапка)",
            sentence: "Маша всегда ... шапку, когда холодно.",
            options: ["надевает", "одевает", "переодевает"],
            correct: "надевает"
        },
        {
            title: "Schal (шарф)",
            sentence: "На улице мороз, ... шарф на шею!",
            options: ["надень", "одень", "переодень"],
            correct: "надень"
        },
        {
            title: "Sich anziehen (Reflexiv)",
            sentence: "Я проснулся, позавтракал и ... .",
            options: ["оделся", "наделся", "переоделся"],
            correct: "оделся"
        },
        {
            title: "Handschuhe (перчатки)",
            sentence: "Мама ... перчатки на руки ребёнка.",
            options: ["надевает", "одевает", "переодевает"],
            correct: "надевает"
        },
        {
            title: "Stiefel (сапоги)",
            sentence: "Андрей ... новые зимние сапоги.",
            options: ["надел", "одел", "переоделся"],
            correct: "надел"
        },
        {
            title: "Sport (Wechseln)",
            sentence: "Перед тренировкой нужно ... .",
            options: ["переодеться", "одеться", "надеться"],
            correct: "переодеться"
        },
        {
            title: "Armbanduhr (часы)",
            sentence: "Дедушка ... старые часы на руку.",
            options: ["надевает", "одевает", "переодевает"],
            correct: "надевает"
        },
        {
            title: "Tochter kleiden (Person)",
            sentence: "Мама ... дочку в нарядное платье.",
            options: ["одевает", "надевает", "переодевает"],
            correct: "одевает"
        },
        {
            title: "Anzug wechseln (Wechsel)",
            sentence: "Перед театром Антон ... в новый костюм.",
            options: ["переоделся", "оделся", "наделся"],
            correct: "переоделся"
        }
    ];

    let currentTaskIdx = null;
    let completedTasks = {}; 

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function loadTask(idx) {
        currentTaskIdx = idx;
        const task = taskData[idx];

        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('task-content').style.display = 'block';
        document.getElementById('task-title').innerText = task.title;

        // Satz mit Lücke anzeigen
        const selectText = task.sentence.replace('...', '<span id="gap">_______</span>');
        document.getElementById('sentence-display').innerHTML = selectText;

        // Dropdown füllen & Mischen
        const select = document.getElementById('verb-select');
        select.innerHTML = '<option value="">-- Wähle das richtige Verb --</option>';
        
        const mixedOptions = shuffle(task.options);
        mixedOptions.forEach(opt => {
            const o = document.createElement('option');
            o.value = opt;
            o.innerText = opt;
            select.appendChild(o);
        });

        // Falls schon gelöst, Status anzeigen
        if (completedTasks[idx]) {
            select.value = completedTasks[idx].val;
            updateStyles(completedTasks[idx].isCorrect);
        } else {
            select.className = '';
            document.getElementById('feedback').innerText = '';
        }

        // Hotspot Highlight
        document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
        document.getElementById(`hs-${idx}`).classList.add('active');
    }

    function checkAnswer() {
        const select = document.getElementById('verb-select');
        const task = taskData[currentTaskIdx];
        const val = select.value;

        if (!val) return;

        const isCorrect = (val === task.correct);
        completedTasks[currentTaskIdx] = { val: val, isCorrect: isCorrect };

        updateStyles(isCorrect);

        // Hotspot Farbe updaten
        const hs = document.getElementById(`hs-${currentTaskIdx}`);
        if (isCorrect) hs.classList.add('completed');
        else hs.classList.remove('completed');
    }

    function updateStyles(isCorrect) {
        const select = document.getElementById('verb-select');
        const feedback = document.getElementById('feedback');
        const gap = document.getElementById('gap');

        if (isCorrect) {
            select.className = 'correct';
            feedback.innerText = "✅ Richtig!";
            feedback.style.color = "var(--success-color)";
            if (gap) gap.innerText = select.value;
        } else {
            select.className = 'wrong';
            feedback.innerText = "❌ Falsch!";
            feedback.style.color = "var(--error-color)";
            if (gap) gap.innerText = "_______";
        }
    }

    function resetEverything() {
        completedTasks = {};
        currentTaskIdx = null;
        document.getElementById('task-content').style.display = 'none';
        document.getElementById('placeholder').style.display = 'block';
        document.querySelectorAll('.hotspot').forEach(h => {
            h.classList.remove('completed', 'active');
        });
    }

    function solveAll() {
        taskData.forEach((t, i) => {
            completedTasks[i] = { val: t.correct, isCorrect: true };
            document.getElementById(`hs-${i}`).classList.add('completed');
        });
        if (currentTaskIdx !== null) loadTask(currentTaskIdx);
    }
</script>

</body>
</html>
